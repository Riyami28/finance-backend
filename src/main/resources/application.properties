# ============================================
# Finance Dashboard Backend - Configuration
# ============================================

# Active profile: use 'postgres' for PostgreSQL, default uses H2
spring.profiles.active=default

# ---- H2 (default, for quick local dev) ----
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- JWT ----
app.jwt.secret=YTk4ZjJkNzFhMGJlNDRhNDk2ZmYxZGNiM2E1MjcxZWE4NjdmZGRkY2YwNTI0Y2U0
app.jwt.expiration-ms=86400000

# ---- Server ----
server.port=8080

# ---- Pagination defaults ----
app.pagination.default-size=20
app.pagination.max-size=100
